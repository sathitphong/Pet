<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweetOps - The Ultimate Candy Reviewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-1: #093C5D;
            --color-2: #3B7597;
            --color-3: #6FD1D7;
            --color-4: #5DF8D8;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--color-1);
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            margin: 0;
        }

        .bg-custom-gradient {
            background: linear-gradient(135deg, var(--color-1) 0%, var(--color-2) 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
        }

        .candy-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 2px solid transparent;
        }

        .candy-card:hover {
            transform: translateY(-5px);
            background: rgba(111, 209, 215, 0.2);
            border-color: var(--color-4);
        }

        .candy-card.active {
            background: var(--color-3);
            color: var(--color-1);
            border-color: var(--color-4);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .btn-buy {
            background-color: var(--color-4);
            color: var(--color-1);
            transition: all 0.2s;
            font-weight: 700;
        }

        .btn-buy:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .rating-star {
            color: var(--color-4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        img {
            object-fit: cover;
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-custom-gradient flex flex-col p-4 md:p-8">

    <header class="flex justify-between items-center mb-6 h-[8vh]">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-[#5DF8D8] flex items-center justify-center shadow-lg">
                <span class="text-2xl text-[#093C5D]">🍬</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight" style="color: var(--color-4);">SweetOps</h1>
        </div>
        <nav class="hidden md:flex gap-8 text-lg font-medium">
            <a href="#" class="hover:text-[#6FD1D7] transition-colors">Trending</a>
            <a href="#" class="hover:text-[#6FD1D7] transition-colors">New Drops</a>
            <a href="#" class="hover:text-[#6FD1D7] transition-colors">Categories</a>
        </nav>
    </header>

    <main class="flex flex-col md:flex-row gap-6 h-[82vh]">
        <section class="w-full md:w-1/3 flex flex-col gap-4 overflow-hidden">
            <div class="flex items-center justify-between px-2">
                <h2 class="text-2xl font-semibold">Today's Picks</h2>
                <span class="text-sm opacity-70">12 Candies Found</span>
            </div>
            <div id="candy-list" class="flex flex-col gap-4 overflow-y-auto no-scrollbar pr-2 pb-10"></div>
        </section>

        <section id="detail-view" class="w-full md:w-2/3 glass-panel p-6 md:p-10 flex flex-col md:flex-row gap-8 overflow-hidden relative">
            <div id="detail-content" class="flex flex-col md:flex-row gap-8 w-full h-full opacity-0"></div>
        </section>
    </main>

    <script>
        const candyData = [
            {
                id: 1,
                name: "Sour Patch Kids",
                tagline: "First they're sour, then they're sweet.",
                rating: 4.8,
                price: "$3.49",
                image: "https://images.unsplash.com/photo-1581798459219-318e76aecc7b?auto=format&fit=crop&q=80&w=800",
                description: "A cult classic that balances a citric acid punch with a soft gummy center. Perfect for movie nights and long road trips.",
                opinions: [
                    { user: "@SugarRush", text: "The blue ones are objectively the best.", stars: 5 },
                    { user: "@SourKing", text: "Wish they were even more sour!", stars: 4 },
                    { user: "@GummyLover", text: "Consistency is always perfect.", stars: 5 }
                ],
                whereToBuy: "Available at Walmart, Target, and Amazon."
            },
            {
                id: 2,
                name: "Ferrero Rocher",
                tagline: "The golden experience of hazelnut.",
                rating: 4.9,
                price: "$12.99",
                image: "https://images.unsplash.com/photo-1549007994-cb92caebd54b?auto=format&fit=crop&q=80&w=800",
                description: "A whole roasted hazelnut encased in a thin wafer shell filled with hazelnut cream, covered in milk chocolate and chopped hazelnuts.",
                opinions: [
                    { user: "@FancyBites", text: "The perfect gift for literally anyone.", stars: 5 },
                    { user: "@ChocoAddict", text: "I can't stop at just one. Dangerous.", stars: 5 },
                    { user: "@NuttyTraveler", text: "Expensive but worth every cent.", stars: 4 }
                ],
                whereToBuy: "Luxury grocers, Costco, and Duty-Free shops."
            },
            {
                id: 3,
                name: "Japanese KitKat Matcha",
                tagline: "Authentic green tea elegance.",
                rating: 4.5,
                price: "$8.50",
                image: "https://images.unsplash.com/photo-1511381939415-e44015466834?auto=format&fit=crop&q=80&w=800",
                description: "Direct from Japan, this KitKat features high-quality Uji Matcha mixed into the white chocolate coating for an earthy, refined taste.",
                opinions: [
                    { user: "@TokyoTreats", text: "Better than the original milk chocolate.", stars: 5 },
                    { user: "@MatchaMom", text: "A bit sweet, but the tea flavor is real.", stars: 4 },
                    { user: "@SnackExotic", text: "Hard to find but amazing texture.", stars: 5 }
                ],
                whereToBuy: "H-Mart, Don Quijote, or specialty importers."
            },
            {
                id: 4,
                name: "Skittles Wild Berry",
                tagline: "Experience the berry rainbow.",
                rating: 4.3,
                price: "$2.99",
                image: "https://images.unsplash.com/photo-1534073828943-f801091bb18c?auto=format&fit=crop&q=80&w=800",
                description: "A fruity explosion of Melon Berry, Strawberry, Raspberry, Wild Cherry, and Berry Punch flavors.",
                opinions: [
                    { user: "@RainbowRider", text: "Purple is the king of this bag.", stars: 5 },
                    { user: "@DentistDream", text: "Too sticky for me, but the taste is 10/10.", stars: 3 },
                    { user: "@FruitFanatic", text: "Great for mixing with original skittles.", stars: 4 }
                ],
                whereToBuy: "CVS, Walgreens, and 7-Eleven."
            }
        ];

        let activeId = 1;

        function renderStars(rating) {
            let stars = '';
            for(let i=0; i<5; i++) {
                stars += i < Math.floor(rating) ? '★' : '☆';
            }
            return stars;
        }

        function setActiveCandy(id) {
            activeId = id;
            const candy = candyData.find(c => c.id === id);
            document.querySelectorAll('.candy-card').forEach(card => {
                card.classList.toggle('active', parseInt(card.dataset.id) === id);
            });

            const detail = document.getElementById('detail-content');
            detail.classList.remove('animate-in');
            detail.style.opacity = '0';

            setTimeout(() => {
                detail.innerHTML = `
                    <div class="w-full md:w-1/2 flex flex-col h-full overflow-y-auto no-scrollbar">
                        <div class="relative group h-64 md:h-80 w-full mb-6 overflow-hidden rounded-2xl shadow-2xl bg-white/5">
                            <img src="${candy.image}" alt="${candy.name}" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1599599810769-bcde5a160d32?auto=format&fit=crop&q=80&w=800';">
                            <div class="absolute top-4 right-4 bg-[var(--color-1)] px-4 py-1 rounded-full text-lg font-bold border border-[var(--color-4)]">
                                ${candy.price}
                            </div>
                        </div>
                        <h2 class="text-4xl font-bold mb-2 text-[var(--color-4)]">${candy.name}</h2>
                        <p class="text-lg italic opacity-80 mb-4">"${candy.tagline}"</p>
                        <div class="flex items-center gap-4 mb-6">
                            <div class="text-2xl rating-star">${renderStars(candy.rating)}</div>
                            <span class="text-lg font-medium">${candy.rating} / 5.0</span>
                        </div>
                        <p class="text-md leading-relaxed mb-6 opacity-90 font-light">${candy.description}</p>
                        <div class="mt-auto pt-4">
                            <p class="text-xs opacity-70 mb-1 uppercase tracking-widest font-bold">Find it here:</p>
                            <p class="text-md mb-4">${candy.whereToBuy}</p>
                            <button class="btn-buy w-full py-4 rounded-xl text-lg font-bold uppercase tracking-wide">Add to Wishlist 🍬</button>
                        </div>
                    </div>
                    <div class="w-full md:w-1/2 flex flex-col gap-4">
                        <h3 class="text-xl font-bold mb-2 border-b border-white/20 pb-2">Public Opinion</h3>
                        <div class="flex flex-col gap-4 overflow-y-auto no-scrollbar flex-grow">
                            ${candy.opinions.map(op => `
                                <div class="bg-white/5 p-4 rounded-xl border border-white/10 transition-colors hover:bg-white/10">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-[var(--color-3)] font-bold">${op.user}</span>
                                        <span class="rating-star text-sm">${renderStars(op.stars)}</span>
                                    </div>
                                    <p class="italic opacity-90 text-sm font-light">"${op.text}"</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                detail.classList.add('animate-in');
                detail.style.opacity = '1';
            }, 50);
        }

        function init() {
            const listContainer = document.getElementById('candy-list');
            candyData.forEach(candy => {
                const card = document.createElement('div');
                card.className = `candy-card glass-panel p-4 flex gap-4 items-center`;
                card.dataset.id = candy.id;
                card.onclick = () => setActiveCandy(candy.id);
                card.innerHTML = `
                    <div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 bg-white/5">
                        <img src="${candy.image}" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1599599810769-bcde5a160d32?auto=format&fit=crop&q=80&w=100';">
                    </div>
                    <div class="flex-grow">
                        <h3 class="text-lg font-bold leading-tight">${candy.name}</h3>
                        <div class="flex justify-between items-center mt-1">
                            <span class="text-xs opacity-80">${candy.price}</span>
                            <span class="text-xs rating-star">${renderStars(candy.rating)}</span>
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
            setActiveCandy(1);
        }
        window.onload = init;
    </script>
</body>
</html>
